    <g transform="translate(59 59) scale(0.414)" stroke="#FFF4D8" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.96">
      <path d="M126.933 369.951C126.933 369.951 180.8 412.8 257.6 412.8C334.4 412.8 388.267 369.951 388.267 369.951"/>
      <path d="M112 297.21C112 297.21 205.333 409.6 257.6 409.6C309.867 409.6 403.201 297.21 403.201 297.21"/>
      <path d="M112 207.297C112 207.297 205.333 409.6 257.6 409.6C309.867 409.6 403.201 207.297 403.201 207.297"/>
      <path d="M171.734 128.624C171.734 128.624 230.4 409.6 257.6 409.6C284.8 409.6 343.466 128.624 343.466 128.624"/>
      <path d="M258.667 409.6V102.4"/>
      <rect x="7" y="7" width="498" height="498" rx="249"/>
    </g>
