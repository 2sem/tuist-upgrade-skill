<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Upgrade Tuist CLI agent skill landing image</title>
  <desc id="desc">A polished LinkedIn social image for the upgrade-tuist-cli skill, showing an automated Tuist upgrade pipeline from version detection to verified pull request.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07110F"/>
      <stop offset="0.46" stop-color="#111615"/>
      <stop offset="1" stop-color="#241A0C"/>
    </linearGradient>
    <radialGradient id="ember" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1004 92) rotate(128.3) scale(475 426)">
      <stop stop-color="#FFB84D" stop-opacity="0.8"/>
      <stop offset="0.45" stop-color="#E9572B" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#E9572B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aqua" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(168 522) rotate(-34.6) scale(525 360)">
      <stop stop-color="#46F3C2" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#1FA6A2" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1FA6A2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="157" y1="108" x2="1020" y2="502" gradientUnits="userSpaceOnUse">
