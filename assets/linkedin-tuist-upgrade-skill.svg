      <circle cx="72" cy="31" r="1" fill="#fff" opacity="0.05"/>
      <circle cx="132" cy="11" r="1" fill="#fff" opacity="0.07"/>
      <circle cx="45" cy="93" r="1" fill="#fff" opacity="0.05"/>
      <circle cx="118" cy="112" r="1" fill="#fff" opacity="0.08"/>
      <circle cx="24" cy="146" r="1" fill="#fff" opacity="0.06"/>
    </pattern>
