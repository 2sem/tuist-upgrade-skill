    <text x="264" y="30" fill="#FFCF78" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="15" font-weight="800">clean build</text>
    <path d="M407 24H448" stroke="#E8DDB9" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M439 16L449 24L439 32" stroke="#E8DDB9" stroke-opacity="0.28" stroke-width="2"/>
    <rect x="468" y="0" width="128" height="48" rx="16" fill="#101816" stroke="#F15C2E" stroke-opacity="0.34"/>
    <text x="494" y="30" fill="#FF9B75" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="15" font-weight="800">open PR</text>
  </g>

