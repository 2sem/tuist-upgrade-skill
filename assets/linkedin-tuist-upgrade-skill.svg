    <circle cx="31" cy="29" r="13" fill="#45F7C5" fill-opacity="0.16" stroke="#45F7C5" stroke-opacity="0.75"/>
    <path d="M25 29L30 34L39 24" stroke="#45F7C5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="55" y="25" fill="#FFF4D8" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="15" font-weight="800">Rollback-aware automation</text>
    <text x="55" y="45" fill="#B3C9C0" font-family="Avenir Next, Futura, Helvetica, sans-serif" font-size="12" font-weight="700">non-interactive · verified · PR-ready</text>
